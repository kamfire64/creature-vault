kind = "web"
previewPath = "/"
title = "Creature Collection Game"
version = "1.0.0"
id = "artifacts/creature-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18222

[services.development]
run = "pnpm --filter @workspace/creature-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/creature-game", "run", "build" ]
publicDir = "artifacts/creature-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18222"
BASE_PATH = "/"
